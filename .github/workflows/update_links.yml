
name: Update Scraped Links

on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch:

jobs:
  update-links:
    runs-on: ubuntu-latest
    permissions:  # Add this block
      contents: write # Grant write permission
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        run: python comprehensive_link_extractor.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add scraped-links.json
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update scraped links"
          # Pull latest changes from remote and rebase our commit on top
          git pull --rebase
          git push
